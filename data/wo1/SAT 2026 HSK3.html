<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Kuis Mandarin HSK 3B - Mobile Optimized</title>
  <style>
    :root {
      --primary: #4361ee;
      --secondary: #3f37c9;
      --accent: #f72585;
      --success: #2dc653;
      --danger: #ef233c;
      --bg-grad: linear-gradient(135deg, #4895ef, #4cc9f0, #4361ee, #3f37c9);
      --card-bg: rgba(255, 255, 255, 0.98);
      --shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
      --radius: 16px;
      --tap-size: 44px;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg-grad);
      background-attachment: fixed;
      min-height: 100dvh;
      color: #333;
      margin: 0;
      padding: 10px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .app-container {
      width: 100%;
      max-width: 700px;
      margin: 10px auto;
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: calc(100dvh - 20px);
      position: relative;
    }

    /* Header */
    .header {
      background: var(--primary);
      color: white;
      padding: 15px 20px;
      text-align: center;
    }
    .header h1 { font-size: 1.3rem; margin: 0; font-weight: 700; }
    .header p { font-size: 0.85rem; margin: 5px 0 0; opacity: 0.9; }

    /* Stats Bar */
    .stats-bar {
      display: flex;
      justify-content: space-between;
      background: #f0f4f8;
      padding: 10px 15px;
      font-size: 0.9rem;
      font-weight: 600;
      border-bottom: 1px solid #e2e8f0;
      flex-wrap: wrap;
      gap: 5px;
    }
    .progress-track { height: 6px; background: #e0e0e0; width: 100%; }
    .progress-fill { height: 100%; background: var(--success); width: 0%; transition: width 0.3s; }

    /* Quiz Area */
    .quiz-area {
      flex: 1;
      padding: 20px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .q-badge {
      display: inline-block;
      background: var(--accent);
      color: white;
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 0.75rem;
      font-weight: bold;
      margin-bottom: 10px;
      align-self: flex-start;
    }

    .q-text {
      font-size: 1.1rem;
      line-height: 1.6;
      margin-bottom: 20px;
      white-space: pre-line;
    }

    /* Hanzi Styles */
    .hanzi, .hanzi-btn, .word-chip {
      font-family: 'SimSun', 'NSimSun', 'STSong', 'AR PL New Sung', serif;
      font-size: 32px;
      color: #2c3e50;
      font-weight: 500;
    }

    @media (max-width: 480px) {
      .hanzi, .hanzi-btn, .word-chip { font-size: 28px; }
      .q-text { font-size: 1rem; }
    }

    .blank {
      display: inline-block;
      min-width: 80px;
      border-bottom: 3px dashed var(--primary);
      text-align: center;
      margin: 0 5px;
      vertical-align: baseline;
    }

    /* Options */
    .options-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 12px;
    }
    .opt-btn {
      padding: 16px;
      border: 2px solid #cbd5e1;
      border-radius: 12px;
      background: white;
      cursor: pointer;
      text-align: center;
      transition: 0.2s;
      min-height: 50px;
    }
    .opt-btn:active, .opt-btn.active {
      border-color: var(--primary);
      background: #eef2ff;
      transform: scale(0.98);
    }

    /* Input & Sentence */
    .text-input {
      width: 100%;
      padding: 15px;
      border: 2px solid #cbd5e1;
      border-radius: 12px;
      font-size: 24px;
      margin-bottom: 10px;
    }
    .text-input:focus { border-color: var(--primary); outline: none; }

    .word-bank, .answer-box {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      min-height: 45px;
    }
    .answer-box {
      background: #f8f9fa;
      border: 2px dashed var(--primary);
      border-radius: 12px;
      padding: 10px;
      margin: 10px 0;
    }
    .word-chip {
      padding: 10px 16px;
      background: var(--primary);
      color: white;
      border-radius: 20px;
      cursor: pointer;
      font-size: 26px;
    }
    .word-chip.selected { background: #e0e0e0; color: #333; }

    /* Navigation */
    .nav-controls {
      padding: 15px 20px;
      background: #fff;
      border-top: 1px solid #eee;
      display: flex;
      gap: 10px;
    }
    .btn {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      background: #f1f5f9;
      color: #333;
    }
    .btn-submit {
      background: var(--success);
      color: white;
      flex: 2;
    }
    .btn:disabled { opacity: 0.5; pointer-events: none; }
    .btn:active { transform: scale(0.98); }

    /* Modals */
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      justify-content: center;
      align-items: center;
      padding: 20px;
      -webkit-backdrop-filter: blur(4px);
      backdrop-filter: blur(4px);
    }
    .modal.active { display: flex; }
    .modal-box {
      background: white;
      border-radius: 20px;
      width: 100%;
      max-width: 500px;
      max-height: 90dvh;
      overflow-y: auto;
      padding: 25px;
      text-align: center;
      animation: popIn 0.3s;
    }
    @keyframes popIn {
      0% { transform: scale(0.9); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
    .score-big { font-size: 3rem; font-weight: 800; color: var(--primary); margin: 15px 0; }
    .result-stats { display: flex; justify-content: center; gap: 20px; margin: 15px 0; font-weight: 600; }
    
    .review-item {
      background: #f8f9fa;
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 12px;
      text-align: left;
      border-left: 5px solid #ccc;
    }
    .review-item.correct { border-color: var(--success); background: #f0fdf4; }
    .review-item.incorrect { border-color: var(--danger); background: #fff0f3; }
  </style>
</head>
<body>

<div class="app-container">
  <header class="header">
    <h1>🎓 Kuis Mandarin Kelas 8</h1>
    <p>ASAS Genap TP 2025/2026 • Bab 18-20</p>
  </header>

  <div class="stats-bar">
    <span>✅ <span id="s-correct">0</span></span>
    <span>⏱️ <span id="s-timer">00:00</span></span>
    <span>📦 <span id="s-progress">0/40</span></span>
  </div>
  <div class="progress-track"><div class="progress-fill" id="p-bar"></div></div>

  <main class="quiz-area" id="quiz-content"></main>

  <nav class="nav-controls">
    <button class="btn" id="btn-prev" onclick="navigate(-1)">⬅️</button>
    <button class="btn" id="btn-next" onclick="navigate(1)">Selanjutnya ➡️</button>
    <button class="btn btn-submit" id="btn-submit" onclick="submitQuiz()" disabled>Selesai ✅</button>
  </nav>
</div>

<!-- Modal Hasil -->
<div class="modal" id="modal-result">
  <div class="modal-box">
    <h2>🎉 Hasil Kuis</h2>
    <div class="score-big"><span id="r-score">0</span>/40</div>
    <div class="result-stats">
      <span style="color:var(--success)">✅ <span id="r-correct">0</span></span>
      <span style="color:var(--danger)">❌ <span id="r-wrong">0</span></span>
    </div>
    <p id="r-msg" style="margin-bottom:20px;color:#666;">Semangat!</p>
    <button class="btn btn-submit" style="width:100%;margin-bottom:10px" onclick="openReview()">📖 Lihat Pembahasan</button>
    <button class="btn" style="width:100%;background:var(--primary);color:white" onclick="initQuiz()">🔄 Mulai Ulang</button>
  </div>
</div>

<!-- Modal Review -->
<div class="modal" id="modal-review">
  <div class="modal-box" style="text-align:left">
    <h2 style="text-align:center">📖 Pembahasan</h2>
    <div id="review-list" style="margin-top:20px"></div>
    <button class="btn" style="width:100%;margin-top:15px;background:#333;color:white" onclick="closeReview()">Kembali</button>
  </div>
</div>

<script>
  /* =========================================
     DATA SOAL 40 NOMOR (ANS DISAMAKAN PERSIS)
     ========================================= */
  const RAW = [
    {id:'v1',type:'choice',q:'1. 天空很（__），看起来很漂亮。',opts:['嘴','同意','国家','蓝','鸟'],ans:'蓝'},
    {id:'v2',type:'choice',q:'2. 我（__）你的看法。',opts:['嘴','同意','国家','蓝','鸟'],ans:'同意'},
    {id:'v3',type:'choice',q:'3. 他张开（__）笑了。',opts:['嘴','同意','国家','蓝','鸟'],ans:'嘴'},
    {id:'v4',type:'choice',q:'4. 中国是一个很大的（__）。',opts:['嘴','同意','国家','蓝','鸟'],ans:'国家'},
    {id:'v5',type:'choice',q:'5. 树上有一只小（__）在唱歌。',opts:['嘴','同意','国家','蓝','鸟'],ans:'鸟'},
    {id:'v6',type:'choice',q:'6. A：昨天的比赛你输了吧？\nB：是的，我有点（__）。',opts:['难过','碗','关心','向','动物'],ans:'难过'},
    {id:'v7',type:'choice',q:'7. A：你最近身体怎么样？\nB：谢谢你这么（__）我，我很好。',opts:['难过','碗','关心','向','动物'],ans:'关心'},
    {id:'v8',type:'choice',q:'8. A：你喜欢去动物园吗？\nB：当然，我最喜欢看各种（__）。',opts:['难过','碗','关心','向','动物'],ans:'动物'},
    {id:'v9',type:'choice',q:'9. A：老师在教室里。\nB：我们快点走过去，（__）老师问好吧。',opts:['难过','碗','关心','向','动物'],ans:'向'},
    {id:'v10',type:'choice',q:'10. 妈妈用（__）盛饭。',opts:['难过','碗','关心','向','动物'],ans:'碗'},
    {id:'m1',type:'choice',q:'11. 你为什么不想出去玩？',opts:['A. 我昨天去超市买东西。','B. 因为我今天有点儿累。','C. 我最喜欢吃水果。','D. 我们一起去看电影吧。','E. 他正在图书馆看书。'],ans:'B. 因为我今天有点儿累。'},
    {id:'m2',type:'choice',q:'12. 你昨天去哪儿了？',opts:['A. 我昨天去超市买东西。','B. 因为我今天有点儿累。','C. 我最喜欢吃水果。','D. 我们一起去看电影吧。','E. 他正在图书馆看书。'],ans:'A. 我昨天去超市买东西。'},
    {id:'m3',type:'choice',q:'13. 你最喜欢吃什么？',opts:['A. 我昨天去超市买东西。','B. 因为我今天有点儿累。','C. 我最喜欢吃水果。','D. 我们一起去看电影吧。','E. 他正在图书馆看书。'],ans:'C. 我最喜欢吃水果。'},
    {id:'m4',type:'choice',q:'14. 小王现在在哪儿？',opts:['A. 我昨天去超市买东西。','B. 因为我今天有点儿累。','C. 我最喜欢吃水果。','D. 我们一起去看电影吧。','E. 他正在图书馆看书。'],ans:'E. 他正在图书馆看书。'},
    {id:'m5',type:'choice',q:'15. 周末我们做什么？',opts:['A. 我昨天去超市买东西。','B. 因为我今天有点儿累。','C. 我最喜欢吃水果。','D. 我们一起去看电影吧。','E. 他正在图书馆看书。'],ans:'D. 我们一起去看电影吧。'},
    {id:'m6',type:'choice',q:'16. 你家离学校远不远？',opts:['A. 他今年十二岁了。','B. 明天可能会下雨。','C. 我家住在学校旁边。','D. 她每天下午三点回家。','E. 这个苹果又大又甜。'],ans:'C. 我家住在学校旁边。'},
    {id:'m7',type:'choice',q:'17. 这个苹果怎么样？',opts:['A. 他今年十二岁了。','B. 明天可能会下雨。','C. 我家住在学校旁边。','D. 她每天下午三点回家。','E. 这个苹果又大又甜。'],ans:'E. 这个苹果又大又甜。'},
    {id:'m8',type:'choice',q:'18. 明天天气怎么样？',opts:['A. 他今年十二岁了。','B. 明天可能会下雨。','C. 我家住在学校旁边。','D. 她每天下午三点回家。','E. 这个苹果又大又甜。'],ans:'B. 明天可能会下雨。'},
    {id:'m9',type:'choice',q:'19. 他多大了？',opts:['A. 他今年十二岁了。','B. 明天可能会下雨。','C. 我家住在学校旁边。','D. 她每天下午三点回家。','E. 这个苹果又大又甜。'],ans:'A. 他今年十二岁了。'},
    {id:'m10',type:'choice',q:'20. 你们周末有什么计划？',opts:['A. 他今年十二岁了。','B. 明天可能会下雨。','C. 我家住在学校旁边。','D. 我们打算去爬山。','E. 这个苹果又大又甜。'],ans:'D. 我们打算去爬山。'},
    {id:'r1',type:'choice',q:'21. 小王和小李在同一个学校上学。他们都上初二，但是不同班。小王在二班，小李在三班。每天课间十分钟，他们常常一起聊天，有时候还一起去食堂买东西。\n★小王：',opts:['A. 和小李同班','B. 课间常和小李聊天','C. 不在同一个学校'],ans:'B. 课间常和小李聊天'},
    {id:'r2',type:'choice',q:'22. 昨天我和同学们去图书馆学习。小王坐在我的旁边，我们一起看书、做练习。中午的时候，我们还一起去食堂吃饭。\n★小王：',opts:['A. 昨天和我一起去图书馆','B. 在家睡觉','C. 没有和我一起学习'],ans:'A. 昨天和我一起去图书馆'},
    {id:'r3',type:'choice',q:'23. 小张的家离学校很远，他每天坐公共汽车去上学。我家离学校很近，所以我走路去学校。我们常常在学校门口见面，然后一起进教室。\n★小张：',opts:['A. 每天坐公共汽车去学校','B. 家离学校很近','C. 常常和我一起走路去学校'],ans:'A. 每天坐公共汽车去学校'},
    {id:'r4',type:'choice',q:'24. 小李最喜欢的运动是踢足球。他每个星期六都去体育场练习，有时候也和我一起打篮球。虽然他个子不高，但是跑得很快。\n★小李：',opts:['A. 每个星期六都去体育场踢足球','B. 个子很高','C. 有时候和我一起打篮球'],ans:'C. 有时候和我一起打篮球'},
    {id:'r5',type:'choice',q:'25. 小美每天早晨七点起床，吃早饭以后就去学校。她下午五点放学，晚上九点睡觉。\n★小美：',opts:['A. 晚上十点睡觉','B. 每天七点起床','C. 下午六点放学'],ans:'B. 每天七点起床'},
    {id:'s1',type:'sentence',q:'26. 喜欢/动物/什么/你',words:['喜欢','动物','什么','你'],ans:'你喜欢什么动物'},
    {id:'s2',type:'sentence',q:'27. 天气/今天/怎么样/的',words:['天气','今天','怎么样','的'],ans:'今天的天气怎么样'},
    {id:'s3',type:'sentence',q:'28. 黄/秋天/变/树叶',words:['黄','秋天','变','树叶'],ans:'秋天树叶变黄'},
    {id:'s4',type:'sentence',q:'29. 小狗/长长/的/耳朵/的',words:['小狗','长长','的','耳朵','的'],ans:'小狗的耳朵长长的'},
    {id:'s5',type:'sentence',q:'30. 去/我们/公园/一起/吧',words:['去','我们','公园','一起','吧'],ans:'我们一起去公园吧'},
    {id:'p1',type:'input',q:'31. Huánɡ hé\n(_____)是中国很有名的河流。',ans:'黄河'},
    {id:'p2',type:'input',q:'32. yǒu mínɡ\n北京是中国很(_____)的城市。',ans:'有名'},
    {id:'p3',type:'input',q:'33. qí ɡuài\n今天的天气很(_____)，早上很冷下午很热。',ans:'奇怪'},
    {id:'p4',type:'input',q:'34. liǎn\n她的(_____)很漂亮，大家都喜欢看她的笑容。',ans:'脸'},
    {id:'p5',type:'input',q:'35. mǎ\n那匹(_____)跑得很快。',ans:'马'},
    {id:'c1',type:'char',q:'36. 请__，这儿有人吗？我能坐在你们中__吗？ （间、问）',opts:['间','问'],ans:['问','间']},
    {id:'c2',type:'char',q:'37. 我们坐__去旅行，行李要一起__。 （船、搬）',opts:['船','搬'],ans:['船','搬']},
    {id:'c3',type:'char',q:'38. 这匹__跑得很快，你觉得好__？ （马、吗）',opts:['马','吗'],ans:['马','吗']},
    {id:'c4',type:'char',q:'39. 他的眼__真漂亮，天气__朗。 （睛、晴）',opts:['睛','晴'],ans:['睛','晴']},
    {id:'c5',type:'char',q:'40. 他跑得真__，这块蛋糕很__。 （快、块）',opts:['快','块'],ans:['快','块']}
  ];

  /* =========================================
     LOGIKA KUIS
     ========================================= */
  let qs = [], cur = 0, ans = {}, done = new Set();
  let sec = 0, timer, finished = false;

  const $ = id => document.getElementById(id);
  const shuffle = a => [...a].sort(() => Math.random() - 0.5);
  const norm = s => String(s||'').trim().replace(/\s+/g, '');

  function check(q) {
    let u = ans[q.id] || '';
    if (q.type === 'sentence') u = ans[q.id + '_j'] || '';
    u = norm(u); let c = norm(q.ans);
    if (q.type === 'char') {
      let uArr = Array.isArray(u) ? u : (Array.isArray(q.ans) ? [] : [u]);
      return JSON.stringify(uArr.map(norm)) === JSON.stringify(q.ans.map(norm));
    }
    return u === c;
  }

  function fmt(s) { return [Math.floor(s/60), s%60].map(v => String(v).padStart(2,'0')).join(':'); }

  function initQuiz() {
    qs = shuffle(RAW); cur = 0; ans = {}; done = new Set(); sec = 0; finished = false;
    clearInterval(timer); timer = setInterval(() => { sec++; $('s-timer').textContent = fmt(sec); }, 1000);
    $('modal-result').classList.remove('active');
    $('modal-review').classList.remove('active');
    render();
  }

  function render() {
    const q = qs[cur];
    $('s-progress').textContent = `${done.size}/40`;
    $('p-bar').style.width = `${(done.size/40)*100}%`;
    $('btn-submit').disabled = done.size < 40;
    $('btn-prev').disabled = cur === 0;
    $('btn-next').disabled = cur === 39;

    let h = `<div class="q-badge">Soal ${cur+1} • ${getType(q.type)}</div>`;
    
    if (q.type === 'choice') {
      h += `<div class="q-text hanzi">${q.q}</div><div class="options-grid">`;
      shuffle(q.opts).forEach(o => {
        const act = ans[q.id] === o ? 'active' : '';
        h += `<div class="opt-btn hanzi-btn ${act}" onclick="pick('${q.id}', this, '${o}')">${o}</div>`;
      });
      h += '</div>';
    } else if (q.type === 'sentence') {
      h += `<div class="q-text">📝 ${q.q}</div><div class="word-bank" id="wb-${q.id}">`;
      shuffle(q.words).forEach(w => h += `<div class="word-chip" onclick="addW('${q.id}', this, '${w}')">${w}</div>`);
      h += `</div><div class="answer-box" id="ab-${q.id}"></div><button class="btn" style="font-size:0.8rem;padding:8px" onclick="resetS('${q.id}')">🔄 Reset</button>`;
    } else if (q.type === 'input') {
      h += `<div class="q-text" style="font-size:0.95rem">${q.q}</div><input class="text-input hanzi" id="inp-${q.id}" placeholder="Ketik Hanzi..." value="${ans[q.id]||''}" oninput="saveIn('${q.id}', this.value)">`;
    } else if (q.type === 'char') {
      h += `<div class="q-text hanzi">${q.q}</div><div class="options-grid">`;
      q.opts.forEach(o => {
        const act = (ans[q.id]||[]).includes(o) ? 'active' : '';
        h += `<div class="opt-btn hanzi-btn ${act}" onclick="pickC('${q.id}', '${o}', this)">${o}</div>`;
      });
      h += '</div>';
    }

    $('quiz-content').innerHTML = `<div class="question-card">${h}</div>`;
  }

  function getType(t) { return {choice:'Pilihan Ganda',sentence:'Susun Kalimat',input:'Pinyin → Hanzi',char:'Beda Hanzi'}[t]; }

  window.pick = (id, el, val) => {
    ans[id] = val; done.add(id);
    el.parentElement.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active'); render(); // refresh stats only
  };

  window.addW = (id, el, w) => {
    if(!ans[id]) ans[id] = [];
    if(ans[id].length >= 6) return;
    ans[id].push(w); el.style.display = 'none';
    const ab = $(`ab-${id}`);
    const chip = document.createElement('div');
    chip.className = 'word-chip selected';
    chip.textContent = w;
    chip.onclick = () => remW(id, w, el, chip);
    ab.appendChild(chip);
    ans[id + '_j'] = ans[id].join(''); done.add(id); render();
  };

  window.remW = (id, w, el, chip) => {
    ans[id] = ans[id].filter(v => v !== w);
    el.style.display = ''; chip.remove();
    ans[id + '_j'] = ans[id].join(''); render();
  };

  window.resetS = id => { ans[id] = []; ans[id+'_j'] = ''; $(`wb-${id}`).querySelectorAll('.word-chip').forEach(e=>e.style.display=''); $(`ab-${id}`).innerHTML = ''; render(); };

  window.saveIn = (id, val) => { ans[id] = val; done.add(id); render(); };

  window.pickC = (id, val, el) => {
    if(!ans[id]) ans[id] = [];
    if(ans[id].length >= 2) ans[id] = [];
    if(ans[id].includes(val)) ans[id] = ans[id].filter(v=>v!==val); else ans[id].push(val);
    el.parentElement.querySelectorAll('.opt-btn').forEach(b => b.classList.toggle('active', ans[id].includes(b.textContent.trim())));
    if(ans[id].length === 2) done.add(id); render();
  };

  window.navigate = d => { cur += d; render(); };

  window.submitQuiz = () => {
    if(done.size < 40) { alert(`⚠️ Jawab semua soal! Baru ${done.size}/40.`); return; }
    finished = true; clearInterval(timer);
    let cor = qs.filter(check).length;
    $('r-score').textContent = cor;
    $('r-correct').textContent = cor;
    $('r-wrong').textContent = 40 - cor;
    $('s-correct').textContent = cor;
    $('r-msg').textContent = cor >= 32 ? '🌟 Luar Biasa! Penguasaan Hanzi sangat baik!' : cor >= 24 ? '👍 Bagus! Terus latih pelafalan.' : '💪 Jangan menyerah! Lihat pembahasan ya.';
    $('modal-result').classList.add('active');
  };

  window.openReview = () => {
    $('modal-result').classList.remove('active');
    $('modal-review').classList.add('active');
    let list = $('review-list'); list.innerHTML = '';
    qs.forEach((q, i) => {
      const ok = check(q);
      let u = ans[q.id] || '';
      if(q.type === 'sentence') u = ans[q.id+'_j'] || '';
      let div = document.createElement('div');
      div.className = `review-item ${ok ? 'correct' : 'incorrect'}`;
      div.innerHTML = `
        <b>${ok ? '✅' : '❌'} Soal ${i+1}</b><br>
        <span class="hanzi" style="font-size:24px">${q.q.replace(/__|___/g,'____')}</span><br>
        <small>Jawabanmu: <b>${u || '-'}</b></small><br>
        ${!ok ? `<small style="color:green">Kunci: <b>${q.ans}</b></small>` : ''}
      `;
      list.appendChild(div);
    });
  };

  window.closeReview = () => { $('modal-review').classList.remove('active'); $('modal-result').classList.add('active'); };

  window.onload = initQuiz;
</script>
</body>
</html>
